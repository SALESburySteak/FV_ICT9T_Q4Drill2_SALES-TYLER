<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q4 Drill 2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: rgb(255, 229, 204); 
    }
    #container {
      text-align: center;
      margin-top: 10%;
      border: 3px solid #fd7e14; 
      border-radius: 8px;
      padding: 20px;
      max-width: 600px;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
      background-color: #fff; 
    }
    .form-control {
      max-width: 350px;
      margin: 10px auto; 
    }
    .btn {
      max-width: 200px;
      margin: 10px auto;
      background-color: #fd7e14;
    }
    .btn:hover {
      background-color: #e3640c; 
    }
  </style>
</head>
<body>
  <div id="container">
    <h1 class="text-warning mb-4">Heat Index Checker</h1>

    <form onsubmit="Check(); return false;">
      <input type="text" class="form-control" id="Temp" placeholder="Input Temperature Degree Value">
      <input type="text" class="form-control" id="Hum" placeholder="Input Humidity Percentage Value">
      <button class="btn btn-info" type="submit">Check</button>
    </form>
  </div>

  <script>
    function Check(){
      var Temp = parseFloat(document.getElementById("Temp").value);
      var Hum = parseFloat(document.getElementById("Hum").value);
      var HeatIndex = Temp + (0.33 * Hum) - 4;  // I added percentage calculation so that its accurate//
      let message = "";
      
      switch(true){
        case ((HeatIndex<=27) && (HeatIndex>0)):
          message = "Status: Cool";
          break;
        case ((HeatIndex<=32) && (HeatIndex>=28)):
          message = "Status: Warm";
          break;
        case ((HeatIndex<=37) && (HeatIndex>=33)):
          message = "Status: Hot";
          break;
        case ((HeatIndex>=38) && (HeatIndex<=41)):
          message = "Status: Very Hot";
          break;
        case (HeatIndex>=42):
          message = "Status: Danger";
          break;
        case (isNaN(HeatIndex) || HeatIndex < 0):
          message = "Please input a valid number.";
      }
      alert("Heat Index: " + HeatIndex.toFixed(2) + "C°" + "\n" + message);
    }
  </script>
</body>
</html>
